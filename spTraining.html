<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Transformation Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans overflow-hidden" style="background: #f8faf8; height: 100vh;">
    <div class="flex h-full">
        <!-- Left Sidebar -->
        <div class="w-80 bg-white border-r border-emerald-200 overflow-y-auto">
            <div class="p-4">
                <!-- Matrix Panel -->
                <div class="mb-6">
                    <h2 class="text-lg font-semibold text-emerald-900 mb-3">Transformation Matrix</h2>
                    <div class="font-mono text-lg flex items-center justify-center">
                        <span class="text-3xl text-emerald-800">[</span>
                        <div class="grid grid-cols-3 gap-2 mx-2">
                            <input type="number" id="m00" value="1" step="0.1" class="w-16 h-10 text-center border border-emerald-300 rounded bg-emerald-50 text-emerald-900">
                            <input type="number" id="m01" value="0" step="0.1" class="w-16 h-10 text-center border border-emerald-300 rounded bg-emerald-50 text-emerald-900">
                            <input type="number" id="m02" value="0" step="0.1" class="w-16 h-10 text-center border border-amber-300 rounded bg-amber-50 text-emerald-900">
                            <input type="number" id="m10" value="0" step="0.1" class="w-16 h-10 text-center border border-emerald-300 rounded bg-emerald-50 text-emerald-900">
                            <input type="number" id="m11" value="1" step="0.1" class="w-16 h-10 text-center border border-emerald-300 rounded bg-emerald-50 text-emerald-900">
                            <input type="number" id="m12" value="0" step="0.1" class="w-16 h-10 text-center border border-amber-300 rounded bg-amber-50 text-emerald-900">
                            <div class="w-16 h-10 flex items-center justify-center bg-slate-100 text-slate-500 rounded font-mono">0</div>
                            <div class="w-16 h-10 flex items-center justify-center bg-slate-100 text-slate-500 rounded font-mono">0</div>
                            <div class="w-16 h-10 flex items-center justify-center bg-slate-100 text-slate-500 rounded font-mono">1</div>
                        </div>
                        <span class="text-3xl text-emerald-800">]</span>
                    </div>
                </div>

                <!-- Presets -->
                <div class="mb-6">
                    <h3 class="text-sm font-semibold text-emerald-900 mb-2">Presets</h3>
                    <div class="grid grid-cols-2 gap-1">
                        <button onclick="setPreset('identity')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Identity</button>
                        <button onclick="setPreset('rotation')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Rotation</button>
                        <button onclick="setPreset('scale')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Scale</button>
                        <button onclick="setPreset('shearX')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Shear X</button>
                        <button onclick="setPreset('shearY')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Shear Y</button>
                        <button onclick="setPreset('translation')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Translation</button>
                        <button onclick="setPreset('reflectX')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Reflect X</button>
                        <button onclick="setPreset('reflectY')" class="preset-btn px-3 py-2 text-sm border border-emerald-300 rounded hover:bg-emerald-50 transition-colors">Reflect Y</button>
                    </div>
                    
                    <!-- Parameter sliders -->
                    <div id="params" class="mt-3 space-y-2 hidden">
                        <div id="param-angle" class="hidden">
                            <label class="text-sm text-emerald-700">Angle (°)</label>
                            <input type="range" id="angle-slider" min="0" max="360" value="45" class="w-full">
                            <span id="angle-value" class="text-sm font-mono text-emerald-800">45°</span>
                        </div>
                        <div id="param-scale" class="hidden">
                            <label class="text-sm text-emerald-700">Scale X</label>
                            <input type="range" id="scaleX-slider" min="0.1" max="3" step="0.1" value="2" class="w-full">
                            <span id="scaleX-value" class="text-sm font-mono text-emerald-800">2.0</span>
                            <label class="text-sm text-emerald-700">Scale Y</label>
                            <input type="range" id="scaleY-slider" min="0.1" max="3" step="0.1" value="1" class="w-full">
                            <span id="scaleY-value" class="text-sm font-mono text-emerald-800">1.0</span>
                        </div>
                        <div id="param-shear" class="hidden">
                            <label class="text-sm text-emerald-700">Shear Factor</label>
                            <input type="range" id="shear-slider" min="-2" max="2" step="0.1" value="0.5" class="w-full">
                            <span id="shear-value" class="text-sm font-mono text-emerald-800">0.5</span>
                        </div>
                        <div id="param-translation" class="hidden">
                            <label class="text-sm text-emerald-700">X Translation</label>
                            <input type="range" id="transX-slider" min="-5" max="5" step="0.1" value="2" class="w-full">
                            <span id="transX-value" class="text-sm font-mono text-emerald-800">2.0</span>
                            <label class="text-sm text-emerald-700">Y Translation</label>
                            <input type="range" id="transY-slider" min="-5" max="5" step="0.1" value="-1" class="w-full">
                            <span id="transY-value" class="text-sm font-mono text-emerald-800">-1.0</span>
                        </div>
                    </div>
                </div>

                <!-- Properties -->
                <div class="mb-6">
                    <h3 class="text-sm font-semibold text-emerald-900 mb-2">Properties</h3>
                    <div class="bg-emerald-50 p-3 rounded text-sm space-y-1">
                        <div>Det: <span id="det-value" class="font-mono text-emerald-800">1.00</span></div>
                        <div>Type: <span id="type-value" class="text-emerald-700">Identity</span></div>
                        <div>Invertible: <span id="invertible-value" class="text-emerald-700">Yes</span></div>
                        <div>Area Scale: <span id="area-scale-value" class="font-mono text-emerald-800">1.00</span></div>
                    </div>
                </div>

                <!-- Transformation Description -->
                <div class="mb-6">
                    <h3 class="text-sm font-semibold text-emerald-900 mb-2">Transformation</h3>
                    <div id="transform-description" class="text-sm text-emerald-700 bg-emerald-50 p-3 rounded">
                        T : Identity transformation
                    </div>
                </div>

                <!-- Points Table -->
                <div class="mb-6">
                    <h3 class="text-sm font-semibold text-emerald-900 mb-2">Points</h3>
                    <div id="points-table" class="text-sm space-y-1">
                        <div class="text-slate-500 italic">Click canvas to add points</div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="mb-6 space-y-2">
                    <button onclick="animateTransform()" class="w-full px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700 transition-colors">
                        Animate
                    </button>
                    <button onclick="commitTransform()" class="w-full px-4 py-2 bg-amber-600 text-white rounded hover:bg-amber-700 transition-colors">
                        Commit & Start Next Transform
                    </button>
                    <div class="flex space-x-2">
                        <label class="flex items-center text-sm">
                            <input type="checkbox" id="show-original" checked class="mr-1">
                            Original Grid
                        </label>
                        <label class="flex items-center text-sm">
                            <input type="checkbox" id="show-transformed" checked class="mr-1">
                            Transformed Grid
                        </label>
                    </div>
                </div>

                <!-- History -->
                <div class="mb-6">
                    <h3 class="text-sm font-semibold text-emerald-900 mb-2">History</h3>
                    <div id="replay-banner" class="hidden mb-2 p-2 bg-blue-100 text-blue-800 rounded text-sm">
                        Viewing Step <span id="replay-step"></span> - <button onclick="exitReplay()" class="underline">Return to Live</button>
                    </div>
                    <div id="history-list" class="space-y-2">
                        <div class="text-slate-500 italic text-sm">No transformations yet</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="flex-1 relative">
            <canvas id="canvas" class="w-full h-full cursor-crosshair"></canvas>
            <div id="mouse-coords" class="absolute top-4 left-4 bg-white bg-opacity-90 px-2 py-1 rounded text-sm font-mono text-emerald-800">
                (0.00, 0.00)
            </div>
        </div>
    </div>

    <script>
        // Global state
        let canvas, ctx;
        let matrix = [1, 0, 0, 0, 1, 0, 0, 0, 1];
        let points = [];
        let history = [];
        let currentPreset = null;
        let isAnimating = false;
        let replayMode = false;
        let replayStep = -1;
        
        // Canvas state
        let scale = 30;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let dragPoint = null;

        // Point colors
        const pointColors = [
            '#ef4444', '#f97316', '#eab308', '#22c55e',
            '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899'
        ];

        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            setupCanvas();
            setupEventListeners();
            updateMatrix();
            draw();
        }

        function setupCanvas() {
            function resize() {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * devicePixelRatio;
                canvas.height = rect.height * devicePixelRatio;
                ctx.scale(devicePixelRatio, devicePixelRatio);
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                
                offsetX = rect.width / 2;
                offsetY = rect.height / 2;
                draw();
            }
            
            resize();
            new ResizeObserver(resize).observe(canvas);
        }

        function setupEventListeners() {
            // Matrix inputs
            ['m00', 'm01', 'm02', 'm10', 'm11', 'm12'].forEach(id => {
                document.getElementById(id).addEventListener('input', updateMatrix);
            });

            // Canvas mouse events
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onWheel);
            canvas.addEventListener('contextmenu', onContextMenu);

            // Toggles
            document.getElementById('show-original').addEventListener('change', draw);
            document.getElementById('show-transformed').addEventListener('change', draw);

            // Parameter sliders
            setupSliderListeners();
        }

        function setupSliderListeners() {
            const sliders = [
                'angle-slider', 'scaleX-slider', 'scaleY-slider', 
                'shear-slider', 'transX-slider', 'transY-slider'
            ];
            
            sliders.forEach(id => {
                const slider = document.getElementById(id);
                if (slider) {
                    slider.addEventListener('input', updatePresetParameters);
                }
            });
        }

        function updatePresetParameters() {
            if (!currentPreset) return;
            
            const angle = parseFloat(document.getElementById('angle-slider')?.value || 0);
            const scaleX = parseFloat(document.getElementById('scaleX-slider')?.value || 1);
            const scaleY = parseFloat(document.getElementById('scaleY-slider')?.value || 1);
            const shear = parseFloat(document.getElementById('shear-slider')?.value || 0);
            const transX = parseFloat(document.getElementById('transX-slider')?.value || 0);
            const transY = parseFloat(document.getElementById('transY-slider')?.value || 0);

            // Update value displays
            if (document.getElementById('angle-value')) {
                document.getElementById('angle-value').textContent = angle + '°';
            }
            if (document.getElementById('scaleX-value')) {
                document.getElementById('scaleX-value').textContent = scaleX.toFixed(1);
            }
            if (document.getElementById('scaleY-value')) {
                document.getElementById('scaleY-value').textContent = scaleY.toFixed(1);
            }
            if (document.getElementById('shear-value')) {
                document.getElementById('shear-value').textContent = shear.toFixed(1);
            }
            if (document.getElementById('transX-value')) {
                document.getElementById('transX-value').textContent = transX.toFixed(1);
            }
            if (document.getElementById('transY-value')) {
                document.getElementById('transY-value').textContent = transY.toFixed(1);
            }

            // Apply preset with current parameters
            setPreset(currentPreset, false);
        }

        function setPreset(preset, showParams = true) {
            currentPreset = preset;
            
            // Reset all preset buttons
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-100', 'border-emerald-500');
            });
            
            // Highlight active button
            event.target?.classList.add('bg-emerald-100', 'border-emerald-500');
            
            // Hide all parameter panels
            document.getElementById('params').classList.add('hidden');
            document.querySelectorAll('[id^="param-"]').forEach(el => el.classList.add('hidden'));
            
            let m = [1, 0, 0, 0, 1, 0, 0, 0, 1];
            
            switch (preset) {
                case 'identity':
                    m = [1, 0, 0, 0, 1, 0, 0, 0, 1];
                    break;
                case 'rotation':
                    if (showParams) {
                        document.getElementById('params').classList.remove('hidden');
                        document.getElementById('param-angle').classList.remove('hidden');
                    }
                    const angle = parseFloat(document.getElementById('angle-slider')?.value || 45) * Math.PI / 180;
                    const cos = Math.cos(angle);
                    const sin = Math.sin(angle);
                    m = [cos, -sin, 0, sin, cos, 0, 0, 0, 1];
                    break;
                case 'scale':
                    if (showParams) {
                        document.getElementById('params').classList.remove('hidden');
                        document.getElementById('param-scale').classList.remove('hidden');
                    }
                    const sx = parseFloat(document.getElementById('scaleX-slider')?.value || 2);
                    const sy = parseFloat(document.getElementById('scaleY-slider')?.value || 1);
                    m = [sx, 0, 0, 0, sy, 0, 0, 0, 1];
                    break;
                case 'shearX':
                    if (showParams) {
                        document.getElementById('params').classList.remove('hidden');
                        document.getElementById('param-shear').classList.remove('hidden');
                    }
                    const shx = parseFloat(document.getElementById('shear-slider')?.value || 0.5);
                    m = [1, shx, 0, 0, 1, 0, 0, 0, 1];
                    break;
                case 'shearY':
                    if (showParams) {
                        document.getElementById('params').classList.remove('hidden');
                        document.getElementById('param-shear').classList.remove('hidden');
                    }
                    const shy = parseFloat(document.getElementById('shear-slider')?.value || 0.5);
                    m = [1, 0, 0, shy, 1, 0, 0, 0, 1];
                    break;
                case 'translation':
                    if (showParams) {
                        document.getElementById('params').classList.remove('hidden');
                        document.getElementById('param-translation').classList.remove('hidden');
                    }
                    const tx = parseFloat(document.getElementById('transX-slider')?.value || 2);
                    const ty = parseFloat(document.getElementById('transY-slider')?.value || -1);
                    m = [1, 0, tx, 0, 1, ty, 0, 0, 1];
                    break;
                case 'reflectX':
                    m = [1, 0, 0, 0, -1, 0, 0, 0, 1];
                    break;
                case 'reflectY':
                    m = [-1, 0, 0, 0, 1, 0, 0, 0, 1];
                    break;
            }
            
            matrix = m;
            updateMatrixInputs();
            updateProperties();
            draw();
        }

        function updateMatrixInputs() {
            document.getElementById('m00').value = matrix[0].toFixed(2);
            document.getElementById('m01').value = matrix[1].toFixed(2);
            document.getElementById('m02').value = matrix[2].toFixed(2);
            document.getElementById('m10').value = matrix[3].toFixed(2);
            document.getElementById('m11').value = matrix[4].toFixed(2);
            document.getElementById('m12').value = matrix[5].toFixed(2);
        }

        function updateMatrix() {
            matrix[0] = parseFloat(document.getElementById('m00').value) || 0;
            matrix[1] = parseFloat(document.getElementById('m01').value) || 0;
            matrix[2] = parseFloat(document.getElementById('m02').value) || 0;
            matrix[3] = parseFloat(document.getElementById('m10').value) || 0;
            matrix[4] = parseFloat(document.getElementById('m11').value) || 0;
            matrix[5] = parseFloat(document.getElementById('m12').value) || 0;
            matrix[6] = 0;
            matrix[7] = 0;
            matrix[8] = 1;
            
            updateProperties();
            draw();
        }

        function updateProperties() {
            const det = matrix[0] * matrix[4] - matrix[1] * matrix[3];
            const isInvertible = Math.abs(det) > 1e-10;
            
            document.getElementById('det-value').textContent = det.toFixed(2);
            document.getElementById('invertible-value').textContent = isInvertible ? 'Yes' : 'No';
            document.getElementById('area-scale-value').textContent = Math.abs(det).toFixed(2);
            
            // Detect transformation type
            const type = detectTransformationType();
            document.getElementById('type-value').textContent = type.short;
            document.getElementById('transform-description').textContent = 'T : ' + type.full;
        }

        function detectTransformationType() {
            const [a, b, c, d, e, f] = matrix;
            const det = a * d - b * c;
            
            // Check for identity
            if (Math.abs(a - 1) < 1e-10 && Math.abs(d - 1) < 1e-10 && 
                Math.abs(b) < 1e-10 && Math.abs(c) < 1e-10 && 
                Math.abs(e) < 1e-10 && Math.abs(f) < 1e-10) {
                return { short: 'Identity', full: 'Identity transformation' };
            }
            
            // Check for translation only
            if (Math.abs(a - 1) < 1e-10 && Math.abs(d - 1) < 1e-10 && 
                Math.abs(b) < 1e-10 && Math.abs(c) < 1e-10) {
                return { 
                    short: 'Translation', 
                    full: `Translation by (${e.toFixed(2)}, ${f.toFixed(2)})` 
                };
            }
            
            // Check for pure scaling (no translation)
            if (Math.abs(b) < 1e-10 && Math.abs(c) < 1e-10 && 
                Math.abs(e) < 1e-10 && Math.abs(f) < 1e-10) {
                if (Math.abs(a - d) < 1e-10) {
                    return { 
                        short: 'Uniform Scaling', 
                        full: `Uniform scaling by factor ${a.toFixed(2)}` 
                    };
                } else {
                    return { 
                        short: 'Scaling', 
                        full: `Scaling by ${a.toFixed(2)} in x, ${d.toFixed(2)} in y` 
                    };
                }
            }
            
            // Check for reflection
            if (det < 0) {
                if (Math.abs(a + 1) < 1e-10 && Math.abs(d - 1) < 1e-10 && 
                    Math.abs(b) < 1e-10 && Math.abs(c) < 1e-10) {
                    return { short: 'Reflect Y', full: 'Reflection about the y-axis' };
                }
                if (Math.abs(a - 1) < 1e-10 && Math.abs(d + 1) < 1e-10 && 
                    Math.abs(b) < 1e-10 && Math.abs(c) < 1e-10) {
                    return { short: 'Reflect X', full: 'Reflection about the x-axis' };
                }
            }
            
            // Check for rotation
            if (Math.abs(det - 1) < 1e-10 && Math.abs(a - d) < 1e-10 && 
                Math.abs(b + c) < 1e-10 && Math.abs(e) < 1e-10 && Math.abs(f) < 1e-10) {
                const angle = Math.atan2(c, a) * 180 / Math.PI;
                const dir = angle >= 0 ? 'Anticlockwise' : 'Clockwise';
                return { 
                    short: 'Rotation', 
                    full: `${dir} rotation ${Math.abs(angle).toFixed(0)}° about the origin` 
                };
            }
            
            // Check for shearing
            if (Math.abs(a - 1) < 1e-10 && Math.abs(d - 1) < 1e-10 && 
                Math.abs(e) < 1e-10 && Math.abs(f) < 1e-10) {
                if (Math.abs(c) < 1e-10) {
                    return { 
                        short: 'Shear X', 
                        full: `Shearing in the x-direction by factor of ${b.toFixed(2)}` 
                    };
                }
                if (Math.abs(b) < 1e-10) {
                    return { 
                        short: 'Shear Y', 
                        full: `Shearing in the y-direction by factor of ${c.toFixed(2)}` 
                    };
                }
            }
            
            return { short: 'Composite', full: 'Composite transformation' };
        }

        function transformPoint(x, y) {
            return [
                matrix[0] * x + matrix[1] * y + matrix[2],
                matrix[3] * x + matrix[4] * y + matrix[5]
            ];
        }

        function screenToGrid(screenX, screenY) {
            return [
                (screenX - offsetX) / scale,
                -(screenY - offsetY) / scale
            ];
        }

        function gridToScreen(gridX, gridY) {
            return [
                gridX * scale + offsetX,
                -gridY * scale + offsetY
            ];
        }

        function onMouseDown(e) {
            if (replayMode) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const [gridX, gridY] = screenToGrid(x, y);
            
            // Check if clicking on existing point
            dragPoint = null;
            for (let i = 0; i < points.length; i++) {
                const [px, py] = points[i];
                const [screenPx, screenPy] = gridToScreen(px, py);
                const dist = Math.sqrt((x - screenPx) ** 2 + (y - screenPy) ** 2);
                if (dist < 15) {
                    dragPoint = i;
                    return;
                }
            }
            
            if (e.button === 0) { // Left click
                if (points.length < 8) {
                    points.push([gridX, gridY]);
                    updatePointsTable();
                    draw();
                } else {
                    isDragging = true;
                    lastMouseX = x;
                    lastMouseY = y;
                }
            }
        }

        function onMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const [gridX, gridY] = screenToGrid(x, y);
            
            // Update mouse coordinates display
            document.getElementById('mouse-coords').textContent = 
                `(${gridX.toFixed(2)}, ${gridY.toFixed(2)})`;
            
            if (replayMode) return;
            
            if (dragPoint !== null) {
                points[dragPoint] = [gridX, gridY];
                updatePointsTable();
                draw();
            } else if (isDragging) {
                offsetX += x - lastMouseX;
                offsetY += y - lastMouseY;
                lastMouseX = x;
                lastMouseY = y;
                draw();
            }
        }

        function onMouseUp(e) {
            isDragging = false;
            dragPoint = null;
        }

        function onWheel(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const scaleFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(5, Math.min(100, scale * scaleFactor));
            
            // Zoom towards mouse position
            offsetX = x - (x - offsetX) * (newScale / scale);
            offsetY = y - (y - offsetY) * (newScale / scale);
            scale = newScale;
            
            draw();
        }

        function onContextMenu(e) {
            e.preventDefault();
            if (replayMode) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Check if right-clicking on a point
            for (let i = 0; i < points.length; i++) {
                const [px, py] = points[i];
                const [screenPx, screenPy] = gridToScreen(px, py);
                const dist = Math.sqrt((x - screenPx) ** 2 + (y - screenPy) ** 2);
                if (dist < 15) {
                    points.splice(i, 1);
                    updatePointsTable();
                    draw();
                    break;
                }
            }
        }

        function updatePointsTable() {
            const table = document.getElementById('points-table');
            if (points.length === 0) {
                table.innerHTML = '<div class="text-slate-500 italic">Click canvas to add points</div>';
                return;
            }
            
            let html = '';
            points.forEach((point, i) => {
                const [x, y] = point;
                const [tx, ty] = transformPoint(x, y);
                const color = pointColors[i];
                html += `
                    <div class="flex items-center text-xs font-mono">
                        <div class="w-3 h-3 rounded-full mr-2" style="background: ${color}"></div>
                        P${i + 1}: (${x.toFixed(2)}, ${y.toFixed(2)}) → (${tx.toFixed(2)}, ${ty.toFixed(2)})
                    </div>
                `;
            });
            table.innerHTML = html;
        }

        function draw() {
            const width = canvas.width / devicePixelRatio;
            const height = canvas.height / devicePixelRatio;
            
            ctx.clearRect(0, 0, width, height);
            
            const showOriginal = document.getElementById('show-original').checked;
            const showTransformed = document.getElementById('show-transformed').checked;
            
            // Draw original grid
            if (showOriginal) {
                drawGrid(false);
            }
            
            // Draw transformed grid
            if (showTransformed) {
                drawGrid(true);
            }
            
            // Draw basis vectors
            drawBasisVectors();
            
            // Draw points and connections
            drawPointsAndShape();
            
            // Draw axes
            drawAxes();
        }

        function drawGrid(transformed) {
            const width = canvas.width / devicePixelRatio;
            const height = canvas.height / devicePixelRatio;
            
            ctx.strokeStyle = transformed ? '#16a34a' : '#22c55e';
            ctx.lineWidth = transformed ? 1.5 : 0.5;
            ctx.globalAlpha = transformed ? 0.8 : 0.3;
            
            const gridSize = 1;
            const [minX, minY] = screenToGrid(0, height);
            const [maxX, maxY] = screenToGrid(width, 0);
            
            // Vertical lines
            for (let x = Math.floor(minX / gridSize) * gridSize; x <= maxX; x += gridSize) {
                if (transformed) {
                    drawTransformedLine(x, minY - 1, x, maxY + 1);
                } else {
                    const [sx1, sy1] = gridToScreen(x, minY - 1);
                    const [sx2, sy2] = gridToScreen(x, maxY + 1);
                    ctx.beginPath();
                    ctx.moveTo(sx1, sy1);
                    ctx.lineTo(sx2, sy2);
                    ctx.stroke();
                }
            }
            
            // Horizontal lines
            for (let y = Math.floor(minY / gridSize) * gridSize; y <= maxY; y += gridSize) {
                if (transformed) {
                    drawTransformedLine(minX - 1, y, maxX + 1, y);
                } else {
                    const [sx1, sy1] = gridToScreen(minX - 1, y);
                    const [sx2, sy2] = gridToScreen(maxX + 1, y);
                    ctx.beginPath();
                    ctx.moveTo(sx1, sy1);
                    ctx.lineTo(sx2, sy2);
                    ctx.stroke();
                }
            }
            
            ctx.globalAlpha = 1;
        }

        function drawTransformedLine(x1, y1, x2, y2) {
            const samples = 50;
            ctx.beginPath();
            
            for (let i = 0; i <= samples; i++) {
                const t = i / samples;
                const x = x1 + t * (x2 - x1);
                const y = y1 + t * (y2 - y1);
                const [tx, ty] = transformPoint(x, y);
                const [sx, sy] = gridToScreen(tx, ty);
                
                if (i === 0) {
                    ctx.moveTo(sx, sy);
                } else {
                    ctx.lineTo(sx, sy);
                }
            }
            
            ctx.stroke();
        }

        function drawBasisVectors() {
            const [i1, i2] = transformPoint(1, 0);
            const [j1, j2] = transformPoint(0, 1);
            const [ox, oy] = gridToScreen(0, 0);
            const [ix, iy] = gridToScreen(i1, i2);
            const [jx, jy] = gridToScreen(j1, j2);
            
            // i vector (red)
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            drawArrow(ox, oy, ix, iy);
            
            // j vector (blue)
            ctx.strokeStyle = '#3b82f6';
            drawArrow(ox, oy, jx, jy);
        }

        function drawArrow(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            
            // Arrow head
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const headLen = 10;
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(
                x2 - headLen * Math.cos(angle - Math.PI / 6),
                y2 - headLen * Math.sin(angle - Math.PI / 6)
            );
            ctx.moveTo(x2, y2);
            ctx.lineTo(
                x2 - headLen * Math.cos(angle + Math.PI / 6),
                y2 - headLen * Math.sin(angle + Math.PI / 6)
            );
            ctx.stroke();
        }

        function drawPointsAndShape() {
            if (points.length === 0) return;
            
            // Draw filled shape if we have 3 or more points
            if (points.length >= 3) {
                // Original shape (semi-transparent)
                ctx.fillStyle = 'rgba(34, 197, 94, 0.1)';
                ctx.strokeStyle = 'rgba(34, 197, 94, 0.3)';
                ctx.lineWidth = 1;
                
                ctx.beginPath();
                for (let i = 0; i < points.length; i++) {
                    const [x, y] = points[i];
                    const [sx, sy] = gridToScreen(x, y);
                    if (i === 0) ctx.moveTo(sx, sy);
                    else ctx.lineTo(sx, sy);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // Transformed shape (more opaque)
                ctx.fillStyle = 'rgba(34, 197, 94, 0.2)';
                ctx.strokeStyle = 'rgba(22, 163, 74, 0.6)';
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                for (let i = 0; i < points.length; i++) {
                    const [x, y] = points[i];
                    const [tx, ty] = transformPoint(x, y);
                    const [sx, sy] = gridToScreen(tx, ty);
                    if (i === 0) ctx.moveTo(sx, sy);
                    else ctx.lineTo(sx, sy);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
            
            // Draw points and connections
            points.forEach((point, i) => {
                const [x, y] = point;
                const [tx, ty] = transformPoint(x, y);
                const [sx, sy] = gridToScreen(x, y);
                const [tsx, tsy] = gridToScreen(tx, ty);
                const color = pointColors[i];
                
                // Connection line
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(tsx, tsy);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Original point (hollow)
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
                ctx.stroke();
                
                // Transformed point (filled with glow)
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(tsx, tsy, 6, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Point labels
                ctx.fillStyle = '#14532d';
                ctx.font = '12px Inter';
                ctx.fillText(`P${i + 1}`, sx + 10, sy - 10);
                ctx.fillText(`P${i + 1}'`, tsx + 10, tsy - 10);
            });
        }

        function drawAxes() {
            const width = canvas.width / devicePixelRatio;
            const height = canvas.height / devicePixelRatio;
            
            ctx.strokeStyle = '#14532d';
            ctx.lineWidth = 1.5;
            
            // X-axis
            ctx.beginPath();
            ctx.moveTo(0, offsetY);
            ctx.lineTo(width, offsetY);
            ctx.stroke();
            
            // Y-axis
            ctx.beginPath();
            ctx.moveTo(offsetX, 0);
            ctx.lineTo(offsetX, height);
            ctx.stroke();
            
            // Tick marks and labels
            ctx.font = '10px Inter';
            ctx.fillStyle = '#14532d';
            ctx.textAlign = 'center';
            
            const [minX, minY] = screenToGrid(0, height);
            const [maxX, maxY] = screenToGrid(width, 0);
            
            // X-axis ticks
            for (let x = Math.floor(minX); x <= maxX; x++) {
                if (x === 0) continue;
                const [sx, sy] = gridToScreen(x, 0);
                ctx.beginPath();
                ctx.moveTo(sx, sy - 5);
                ctx.lineTo(sx, sy + 5);
                ctx.stroke();
                ctx.fillText(x.toString(), sx, sy + 18);
            }
            
            // Y-axis ticks
            ctx.textAlign = 'right';
            for (let y = Math.floor(minY); y <= maxY; y++) {
                if (y === 0) continue;
                const [sx, sy] = gridToScreen(0, y);
                ctx.beginPath();
                ctx.moveTo(sx - 5, sy);
                ctx.lineTo(sx + 5, sy);
                ctx.stroke();
                ctx.fillText(y.toString(), sx - 10, sy + 4);
            }
        }

        function animateTransform() {
            if (isAnimating) return;
            isAnimating = true;
            
            const originalMatrix = [1, 0, 0, 0, 1, 0, 0, 0, 1];
            const targetMatrix = [...matrix];
            const duration = 2000;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Ping-pong animation
                let t = progress * 2;
                if (t > 1) t = 2 - t;
                
                // Interpolate matrix
                for (let i = 0; i < 6; i++) {
                    matrix[i] = originalMatrix[i] + t * (targetMatrix[i] - originalMatrix[i]);
                }
                
                updateMatrixInputs();
                updateProperties();
                draw();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    matrix = [...targetMatrix];
                    updateMatrixInputs();
                    updateProperties();
                    draw();
                    isAnimating = false;
                }
            }
            
            animate();
        }

        function commitTransform() {
            if (replayMode) return;
            
            // Apply current transformation to all points
            const transformedPoints = points.map(point => transformPoint(point[0], point[1]));
            
            // Create history entry
            const step = {
                matrix: [...matrix],
                points: points.map((point, i) => ({
                    original: [...point],
                    transformed: [...transformedPoints[i]],
                    color: pointColors[i]
                })),
                description: document.getElementById('transform-description').textContent
            };
            
            history.push(step);
            
            // Update points to transformed positions
            points = transformedPoints;
            
            // Reset matrix to identity
            matrix = [1, 0, 0, 0, 1, 0, 0, 0, 1];
            updateMatrixInputs();
            updateProperties();
            updatePointsTable();
            updateHistoryDisplay();
            draw();
        }

        function updateHistoryDisplay() {
            const historyList = document.getElementById('history-list');
            
            if (history.length === 0) {
                historyList.innerHTML = '<div class="text-slate-500 italic text-sm">No transformations yet</div>';
                return;
            }
            
            let html = '';
            history.forEach((step, index) => {
                html += `
                    <div class="border border-emerald-200 rounded p-2 cursor-pointer hover:bg-emerald-50 transition-colors"
                         onclick="viewHistoryStep(${index})">
                        <div class="flex justify-between items-start mb-1">
                            <div class="font-semibold text-sm text-emerald-900">Step ${index + 1}</div>
                            <button onclick="deleteHistoryStep(${index}); event.stopPropagation();" 
                                    class="text-red-500 hover:text-red-700 text-sm">✕</button>
                        </div>
                        <div class="text-xs text-emerald-700 mb-1">${step.description.replace('T : ', '')}</div>
                        <div class="font-mono text-xs text-slate-600">
                            [${step.matrix[0].toFixed(1)} ${step.matrix[1].toFixed(1)} ${step.matrix[2].toFixed(1)}]<br>
                            [${step.matrix[3].toFixed(1)} ${step.matrix[4].toFixed(1)} ${step.matrix[5].toFixed(1)}]
                        </div>
                        <div class="text-xs mt-1 space-y-0.5">
                            ${step.points.map((point, i) => 
                                `<div style="color: ${point.color}">P${i+1}: (${point.original[0].toFixed(2)}, ${point.original[1].toFixed(2)}) → (${point.transformed[0].toFixed(2)}, ${point.transformed[1].toFixed(2)})</div>`
                            ).join('')}
                        </div>
                    </div>
                `;
            });
            
            historyList.innerHTML = html;
        }

        function viewHistoryStep(index) {
            replayMode = true;
            replayStep = index;
            
            document.getElementById('replay-banner').classList.remove('hidden');
            document.getElementById('replay-step').textContent = index + 1;
            
            // Set matrix to the step's matrix
            const step = history[index];
            matrix = [...step.matrix];
            updateMatrixInputs();
            updateProperties();
            draw();
        }

        function exitReplay() {
            replayMode = false;
            replayStep = -1;
            
            document.getElementById('replay-banner').classList.add('hidden');
            
            // Reset to identity matrix
            matrix = [1, 0, 0, 0, 1, 0, 0, 0, 1];
            updateMatrixInputs();
            updateProperties();
            draw();
        }

        function deleteHistoryStep(index) {
            // Remove the step and all subsequent steps
            history.splice(index);
            
            // Reset points to state before deleted step
            if (index === 0) {
                points = [];
            } else {
                const previousStep = history[index - 1];
                points = previousStep.points.map(p => [...p.transformed]);
            }
            
            updatePointsTable();
            updateHistoryDisplay();
            exitReplay();
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
